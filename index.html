      newState.actions += card.actions || 0;
      newState.buys += card.buys || 0;
      if (card.move && card.move.v > 0) {

      }

        newState.actions += card.actions || 0;
        newState.buys += card.buys || 0;
        if (card.draw > 0) {
          const cp2 = newState.players[newState.cur];
          const dr = drawCards(cp2.deck, cp2.discard, card.draw);
          newState.players = newState.players.map((p,i) => i===newState.cur ? {...p,hand:[...p.hand,...dr.hand],deck:dr.deck,discard:dr.discard} : p);

      if (card.ctype === "loot") {

        if (card.move && card.move.v > 0) {

          newState.attackVictim = opp;
          newState.phase = "attack_pending";

          newState.phase = "attack_pending";
        }

        }

        }
        if (eff.self_trash) {

          newState.trashLeft = 1;

            id: oppPlayer.id + "_curse_" + Date.now() + "_" + i,
          }));
          newState.players = newState.players.map((p, i) =>
            i === opp ? { ...p, discard: [...p.discard, ...curses] } : p
          );
          newState.log = [...newState.log, player.name + " ⚔ " + card.name + " → " + oppPlayer.name + " krijgt " + numCurses + "× Vloek in het deck! 💀"];
          return newState;
        }
        if (atk.type === "storm") {
          newState.attackPending = { type:"storm", value: atk.value, attackerName:player.name };
          newState.attackVictim = opp;
          newState.phase = "attack_storm";
          newState.discardLeft = atk.value;
          newState.discardPending = [];
          newState.log = [...newState.log, player.name + " ⚔ " + card.name + " → Beide spelers leggen " + atk.value + " kaarten af!"];
          return newState;
        }
        if (atk.type === "discard_n" || atk.type === "trash_n" || atk.type === "spy") {
          newState.attackPending = {
            type: atk.type, value: atk.value, attackerName: player.name,
            lootTrigger: card.loot_trigger || null, // carry loot trigger into attack resolution
          };
          newState.attackVictim = opp;
          newState.phase = "attack_pending";
          newState.spyHand = atk.type === "spy" ? [...oppPlayer.hand] : null;
          const actionDesc = atk.type === "discard_n" ? `leg ${atk.value} kaarten af`
                           : atk.type === "trash_n"   ? `vernietig ${atk.value} kaarten`
                           : `een kaart af te leggen naar keuze`;
          newState.log = [...newState.log, player.name + " ⚔ " + card.name + " → " + oppPlayer.name + " moet " + actionDesc + "!"];
          if (card.loot_trigger === "always") {

            newState.log = [...newState.log, "💰 Plunderaar: altijd 💎 Loot voor aanvaller!"];

          return newState;

      }
      const desc = buildDesc(card);
      newState.log = [...newState.log, player.name + " ▶ " + card.name + ": " + desc];

          i === newState.cur ? { ...p, trash: [...p.trash, card] } : p
        );
        newState.played = newState.played.filter(c => c.id !== card.id);
        newState = giveLoot(newState, newState.cur);
        newState.log = [...newState.log, "💎 Juwelenkist vernietigt zichzelf → Loot verdiend!"];
      } else if (card.loot_trigger === "on_any_trash") {

      } else if (card.loot_trigger === "on_move_this_turn") {

        newState.log = [...newState.log, "🪶 Kraaiennest actief: als je beweegt deze beurt → 💎 Loot!"];

    }
    // ── Resolve block_move attack ──
    case "ATTACK_RESOLVE": {
      if (state.phase !== "attack_resolve") return state;
      return {
        ...state,
        phase: state.prevPhase || "action",
        attackPending: null,
        attackVictim: null,
        log: [...state.log, "✓ Aanval verwerkt."],

      const newPending = already
        ? state.discardPending.filter(x => x !== action.id)
        : [...state.discardPending, action.id].slice(0, state.discardLeft);
      return { ...state, discardPending: newPending };
    }

      const ids = new Set(state.discardPending);
      const discarded = state.players[actingIdx].hand.filter(c => ids.has(c.id));
      const newPlayers = state.players.map((p, i) =>
        i === actingIdx ? { ...p, hand: p.hand.filter(c => !ids.has(c.id)), discard: [...p.discard, ...discarded] } : p
      );
      const actingName = state.players[actingIdx].name;

          ...state, players: newPlayers,
          phase: "attack_storm_victim",
          discardPending: [],
          discardLeft: state.attackPending.value,
          log: newLog,
        };

          ...state, players: newPlayers,
          phase: state.prevPhase || "action",
          attackPending: null, attackVictim: null,
          discardPending: [], discardLeft: 0,
          log: [...newLog, "🌩 Storm voorbij."],

    case "ATTACK_VICTIM_TOGGLE": {

      const newPending = already
        ? state.discardPending.filter(x => x !== action.id)
        : [...state.discardPending, action.id].slice(0, state.attackPending.value);

    }
    case "ATTACK_VICTIM_CONFIRM": {

        );
      } else {
        newPlayers = state.players.map((p, i) =>
          i === victimIdx ? { ...p, hand: p.hand.filter(c => !ids.has(c.id)), discard: [...p.discard, ...chosen] } : p
        );
      }
      const actionWord = atk.type === "trash_n" ? "vernietigt" : "legt af";
      let newState = {
        ...state, players: newPlayers,
        phase: state.prevPhase || "action",
        attackPending: null, attackVictim: null,
        discardPending: [], discardLeft: 0, spyHand: null,
        log: [...state.log, victim.name + " " + actionWord + ": " + (chosen.map(c=>c.name).join(", ")||"(niets)")],
      };

          newState.log = [...newState.log, "⚔ Keelsnijder: slachtoffer had minder dan " + atk.value + " kaarten → 💎 Loot!"];
        }
      }
      return newState;
    }
    case "PLAY_TREASURE": {
      if (state.phase !== "buy") return state;

        coins: state.coins + (card.coins || 0),
        played: [...state.played, card],
        players: state.players.map((p, i) =>

        log: [...state.log, player.name + " ▶ " + card.name + " +💰" + (card.coins || 0)],

            ...newState,
            phase: "trash",
            prevPhase: "buy",
            trashLeft: card.trash,
            trashPending: [],
            pendingLootTrigger: "on_trash_valuable", // flag for TRASH_CONFIRM

      if (state.phase !== "buy") return state;
      const treasures = player.hand.filter(c => c.ctype === "treasure");
      if (treasures.length === 0) return state;

        coins: state.coins + total,

        log: [...state.log, player.name + " ▶ alle schatten gespeeld: +💰" + total],

            mv[key] = (mv[key] || 0) - use;

      const baseLog = player.name + " → " + terrIcon + " " + action.hexId;
      if ((hex.terrain === "open" || hex.terrain === "block") && (hex.effect || 0) > 0) {
        const curPlayer = newPlayers[state.cur];
        const effectCount = Math.min(hex.effect, curPlayer.hand.length);
        if (effectCount > 0) {
          const effectType = hex.terrain === "open" ? "discard" : "trash";

          return {
            ...state, players: newPlayers, mv,
            phase: effectType,
            prevPhase: state.phase,
            ...(effectType === "discard"
              ? { discardLeft: effectCount, discardPending: [] }
              : { trashLeft: effectCount, trashPending: [] }),
            log: [...state.log, baseLog + " — " + terrIcon + " effect: " + effectLabel + "!"],

      if (state.pendingLootTrigger === "on_move_this_turn") {
        moveState = giveLoot(moveState, state.cur);
        moveState.pendingLootTrigger = null; // one-time trigger
        moveState.log = [...moveState.log, "🪶 Kraaiennest: je bewoog → 💎 Loot verdiend!"];
      }
      return moveState;
    }
    case "GO_BUY": {
      return {
        ...state, phase: "buy",
        log: [...state.log, player.name + " → koopfase (💰" + state.coins + " · 🛒" + state.buys + ")"],
      };
    }
    case "BUY": {
      if (state.phase !== "buy") return state;

      if (state.coins < def.cost || state.buys < 1) return state;

      return {
        ...state,
        coins: state.coins - def.cost,
        buys: state.buys - 1,
        market: { ...state.market, [action.cardType]: state.market[action.cardType] - 1 },
        players: state.players.map((p, i) =>

        phase: state.prevPhase,
        discardPending: [],
        discardLeft: 0,

    case "TRASH_TOGGLE": {

        : [...state.trashPending, action.id].slice(0, state.trashLeft);
      return { ...state, trashPending: newPending };
    }
    case "TRASH_CONFIRM": {
      if (state.phase !== "trash") return state;

      const trashed = player.hand.filter(c => ids.has(c.id));
      const returnPhase = state.prevPhase || "action";
      let newState = {
        ...state,
        phase: returnPhase,
        trashPending: [],
        trashLeft: 0,
        pendingLootTrigger: null,
        players: state.players.map((p, i) =>
          i === state.cur
            ? { ...p, hand: p.hand.filter(c => !ids.has(c.id)), trash: [...p.trash, ...trashed] }
            : p
        ),
        log: [...state.log, player.name + " 🗑 vernietigt: " + (trashed.map(c => c.name).join(", ") || "(niets)")],
      };
      if (state.pendingLootTrigger === "on_trash_valuable") {
        const valuableFound = trashed.some(c => (c.cost || 0) >= 3);
        if (valuableFound) {
          newState = giveLoot(newState, state.cur);
          newState.log = [...newState.log, "⛏ Pikhouweel: waardevolle kaart vernietigd — 💎 Loot verdiend!"];
        } else {
          newState.log = [...newState.log, "⛏ Pikhouweel: kaart te goedkoop (geen ≥3💰) — geen Loot."];

        for (let i = 0; i < trashed.length; i++) {
          newState = giveLoot(newState, state.cur);
        }
        if (trashed.length > 0) {

        }
      }
      return newState;
    }
    case "REVEAL_REACTION": {
      if (state.phase !== "attack_pending" && state.phase !== "attack_storm" && state.phase !== "attack_storm_victim") return state;
      const reactCard = state.players[action.playerIdx]?.hand.find(c => c.id === action.id);
      if (!reactCard || reactCard.ctype !== "reaction") return state;
      const rb = reactCard.react_bonus || {};

        ...state,
        phase: state.prevPhase || "action",

        log: [...state.log, state.players[action.playerIdx].name + " 🛡 onthult " + reactCard.name + " — aanval geblokkeerd!"],
      };
      if (rb.draw) {

        s.phase = "attack_pending";

      if (rb.counter_trash) {
        const atk = 1 - action.playerIdx;
        s.attackPending = { type:"trash_n", value:rb.counter_trash, attackerName: s.players[action.playerIdx].name };
        s.attackVictim = atk;
        s.phase = "attack_pending";
      }
      if (rb.steal_coin) s.coins += rb.steal_coin;
      return s;
    }
    case "GIVE_LOOT": {
      return giveLoot(state, action.playerIdx ?? state.cur);
    }
    case "END_TURN": {
      const allDiscard = [...player.discard, ...player.hand, ...state.played];
      const durIds = new Set((state.durationCards[state.cur]||[]).map(d=>d.cardType));
      const played_non_dur = state.played.filter(c => !durIds.has(c.cardType) || c.ctype !== "duration");
      const allDiscardFinal = [...player.discard, ...player.hand, ...played_non_dur];
      const drawn = drawCards(player.deck, allDiscardFinal, HAND_SIZE);
      const nextIdx = 1 - state.cur;
      const nextName = state.players[nextIdx].name;
      const newLog = [...state.log];
      if (drawn.reshuffled) {
        newLog.push("🔀 " + player.name + ": trekstapel leeg — aflegstapel geschud!");
      }
      newLog.push("━━ " + nextName + " aan de beurt ━━");
      let nextState = {
        ...state,
        players: state.players.map((p, i) =>
          i === state.cur ? { ...p, hand: drawn.hand, deck: drawn.deck, discard: drawn.discard } : p
        ),
        cur: nextIdx,
        phase: "action",
        actions: 2, buys: 1, coins: 0,
        mv: { jungle: 0, water: 0, village: 0, open: 0, any: 0 },
        played: [],
        trashPending: [], trashLeft: 0,
        discardPending: [], discardLeft: 0,
        prevPhase: "action",
        attackPending: null, attackVictim: null, spyHand: null,
        pendingLootTrigger: null,
        log: newLog,
      };
      nextState = applyDurationEffects(nextState, nextIdx);
      return nextState;
    }

// ── LOOT HELPER ───────────────────────────────────────────────────────────────
function giveLoot(state, playerIdx) {
  if (!state.lootStack || state.lootStack.length === 0) return state;
  const [cardType, ...rest] = state.lootStack;
  const def = CARDS[cardType];
  if (!def) return { ...state, lootStack: rest };
  const lootCard = { ...def, cardType, id: state.players[playerIdx].id + "_loot_" + cardType + "_" + Date.now() };
  const newPlayers = state.players.map((p, i) =>
    i === playerIdx ? { ...p, discard: [...p.discard, lootCard] } : p
  );
  return {
    ...state,
    lootStack: rest,
    players: newPlayers,
    log: [...state.log, "💎 " + state.players[playerIdx].name + " verdient een buitkaart: " + def.name + "!"],
  };
}
// ── DURATION HELPER ───────────────────────────────────────────────────────────
function applyDurationEffects(state, playerIdx) {
  const dur = state.durationCards[playerIdx] || [];
  if (dur.length === 0) return state;
  let s = { ...state };
  const remaining = [];
  for (const entry of dur) {
    const { cardType, turnsLeft } = entry;
    const def = CARDS[cardType];
    if (!def?.duration_effect) continue;
    const eff = def.duration_effect;
    if (eff.mv_jungle) s.mv = { ...s.mv, jungle: (s.mv.jungle||0) + eff.mv_jungle };
    if (eff.mv_water)  s.mv = { ...s.mv, water:  (s.mv.water ||0) + eff.mv_water  };
    if (eff.mv_village)s.mv = { ...s.mv, village:(s.mv.village||0)+ eff.mv_village };
    if (eff.mv_any)    s.mv = { ...s.mv, any:    (s.mv.any   ||0) + eff.mv_any    };
    if (eff.coins)     s.coins += eff.coins;
    if (eff.actions)   s.actions += eff.actions;
    if (eff.buys)      s.buys += eff.buys;
    if (eff.draw) {
      const cp = s.players[playerIdx];
      const drawn = drawCards(cp.deck, cp.discard, eff.draw);
      s.players = s.players.map((p,i) => i===playerIdx ? {...p, hand:[...p.hand,...drawn.hand], deck:drawn.deck, discard:drawn.discard} : p);
    }
    s.log = [...s.log, "⏳ " + s.players[playerIdx].name + " · " + def.name + " duurde-effect: " + def.desc];
    const newTurns = turnsLeft - 1;
    if (eff.permanent || newTurns > 0) remaining.push({ cardType, turnsLeft: eff.permanent ? 999 : newTurns });
  }
  const newDur = [...s.durationCards];
  newDur[playerIdx] = remaining;
  return { ...s, durationCards: newDur };
}
function buildDesc(card) {
  if (card.ctype === "attack")    return card.desc || "⚔ Aanval";
  if (card.ctype === "curse")     return "-1💰 (Vloek — vernietigen via Kapel)";
  if (card.ctype === "reaction")  return card.desc || "🛡 Verdediging";
  if (card.ctype === "duration")  return card.desc || "⏳ Duurte";
  if (card.ctype === "loot")      return card.desc || "💎 Buit";
  const parts = [];
  if (card.move) parts.push("+" + card.move.v + (TERRAIN[card.move.t]?.icon || "🌍") + " beweg");
  if (card.coins) parts.push("+💰" + card.coins);
  if (card.actions) parts.push("+⚡" + card.actions);
  if (card.buys) parts.push("+🛒" + card.buys);
  if (card.draw) parts.push("+🃏" + card.draw);
  if (card.trash) parts.push("🗑" + card.trash);
  return parts.join(" · ") || "geen effect";
}

function serializeStateForAI(st) {
  const cp = st.players[st.cur];
  const opp = st.players[1 - st.cur];
  const reachable = Object.keys(HEXES).filter(id => canMoveTo(id, cp.pos, st.mv));
  return {
    phase: st.phase,
    actions: st.actions,
    buys: st.buys,
    coins: st.coins,
    movement: st.mv,
    myPosition: cp.pos,
    opponentPosition: opp.pos,
    myHand: cp.hand.map(c => ({
      id: c.id, name: c.name, cardType: c.cardType, ctype: c.ctype,
      move: c.move, coins: c.coins, actions: c.actions, buys: c.buys, draw: c.draw, trash: c.trash,
    })),
    myDeckSize: cp.deck.length,
    myDiscardSize: cp.discard.length,
    reachableHexes: reachable.map(id => ({
      id, terrain: HEXES[id].terrain, cost: HEXES[id].cost, effect: HEXES[id].effect || 0,
    })),
    market: Object.fromEntries(
      Object.keys(st.market).filter(t => st.market[t] > 0)
        .map(t => [t, { supply: st.market[t], cost: CARDS[t].cost, name: CARDS[t].name }])
    ),
    trashLeft: st.trashLeft,
    trashPending: st.trashPending,
    discardLeft: st.discardLeft,
    discardPending: st.discardPending,
  };
}
const AI_SYSTEM = {
  easy:   "Je speelt Vestigium op makkelijk niveau. Maak suboptimale keuzes. Speel willekeurige kaarten. Beweeg niet altijd vooruit. Koop soms nutteloze kaarten. Eindig je beurt snel.",

function computeAITurnLocal(st, difficulty) {
  const actions = [];
  let s = st;
  let limit = 80;
  let lastPhase = null;
  let phaseRepeat = 0;
  const apply = (ac) => {
    const ns = gameReducer(s, ac);
    if (ns !== s) { actions.push(ac); s = ns; }
  };
  const weakest = (hand, n) => {
    const sorted = [...hand].sort((a, b) => {
      if (a.ctype === "curse") return -1;
      if (b.ctype === "curse") return 1;
      return (a.cost || 0) - (b.cost || 0);
    });
    return sorted.slice(0, Math.max(0, n)).map(c => c.id);
  };
  while (s.cur === 1 && s.winner === null && limit-- > 0) {
    const cp = s.players[1];
    if (s.phase === lastPhase) {
      phaseRepeat++;
      if (phaseRepeat > 12) { actions.push({ type: "END_TURN" }); break; }
    } else { lastPhase = s.phase; phaseRepeat = 0; }
    if (s.phase === "discard") {
      const n = Math.min(s.discardLeft || 0, cp.hand.length);
      if (n > 0) weakest(cp.hand, n).forEach(id => apply({ type: "DISCARD_TOGGLE", id }));
      apply({ type: "DISCARD_CONFIRM" });
      continue;
    }
    if (s.phase === "trash") {
      const n = Math.min(s.trashLeft || 0, cp.hand.length);
      if (n > 0) {
        let toTrash;
        if (s.pendingLootTrigger === "on_trash_valuable") {
          const valuable = cp.hand.filter(c => (c.cost||0) >= 3);
          if (valuable.length > 0 && difficulty !== "easy") {
            const nonMove = valuable.filter(c => !c.move);
            const pick = nonMove.length > 0 ? nonMove[0] : valuable[0];
            toTrash = [pick.id];
          } else {
            toTrash = weakest(cp.hand, n);
          }
        } else {
          toTrash = weakest(cp.hand, n);
        }
        toTrash.forEach(id => apply({ type: "TRASH_TOGGLE", id }));
      }
      apply({ type: "TRASH_CONFIRM" });
      continue;
    }
    if (s.phase === "attack_pending") {
      if (s.attackVictim === 1) {
        const reactCards = cp.hand.filter(c => c.ctype === "reaction");
        if (reactCards.length > 0 && difficulty !== "easy") {
          apply({ type: "REVEAL_REACTION", id: reactCards[0].id, playerIdx: 1 });
          continue;
        }
        const n = Math.min((s.attackPending?.value) || 1, cp.hand.length);
        if (n > 0) weakest(cp.hand, n).forEach(id => apply({ type: "ATTACK_VICTIM_TOGGLE", id }));
        apply({ type: "ATTACK_VICTIM_CONFIRM" });
      } else {
        apply({ type: "END_TURN" });
      }
      continue;
    }
    if (s.phase === "attack_storm") {
      if (s.cur === 1) {
        const n = Math.min(s.discardLeft || 0, cp.hand.length);
        if (n > 0) weakest(cp.hand, n).forEach(id => apply({ type: "STORM_DISCARD_TOGGLE", id }));
        apply({ type: "STORM_DISCARD_CONFIRM" });
      } else {
        apply({ type: "END_TURN" });
      }
      continue;
    }
    if (s.phase === "attack_storm_victim") {
      const n = Math.min(s.discardLeft || 0, cp.hand.length);
      if (n > 0) weakest(cp.hand, n).forEach(id => apply({ type: "STORM_DISCARD_TOGGLE", id }));
      apply({ type: "STORM_DISCARD_CONFIRM" });
      continue;
    }
    if (s.phase === "attack_resolve") {
      apply({ type: "ATTACK_RESOLVE" });
      continue;
    }
    if (s.phase === "action") {
      const actionCards = cp.hand.filter(c => ["action","attack","duration"].includes(c.ctype));
      if (s.actions > 0 && actionCards.length > 0) {
        const score = (c) => {
          if (difficulty === "easy") return Math.random();
          if (c.ctype === "attack") return difficulty === "hard" ? 8 : 2;
          if (c.ctype === "duration") {
            const eff = c.duration_effect || {};
            let sc = 5;
            if (eff.mv_jungle || eff.mv_water || eff.mv_village || eff.mv_any) sc += 8;
            if (eff.coins) sc += eff.coins * 2;
            if (eff.draw) sc += eff.draw * 3;
            if (eff.actions) sc += eff.actions * 3;
            return sc;
          }
          let sc = 0;
          if (c.move) sc += c.move.v * 10;
          sc += (c.draw || 0) * 4;
          sc += (c.actions || 0) * 3;
          sc += (c.coins || 0) * 2;
          sc += (c.buys || 0) * 2;
          return sc;
        };
        const best = [...actionCards].sort((a, b) => score(b) - score(a))[0];
        apply({ type: "PLAY_ACTION", id: best.id });
        continue;
      }
      const reachable = Object.keys(HEXES).filter(id => canMoveTo(id, cp.pos, s.mv));
      if (reachable.length > 0) {
        const myCol = HEXES[cp.pos]?.col ?? 0;
        const best = reachable.map(id => {
          const h = HEXES[id];
          if (id === "end") return { id, sc: 99999 };
          const fwd = h.col - myCol; // positive = forward progress
          return { id, sc: difficulty === "easy" ? fwd + Math.random()*2 : fwd * 10 - (h.effect||0)*5 };
        }).sort((a, b) => b.sc - a.sc)[0];
        apply({ type: "MOVE", hexId: best.id });
        continue;
      }
      apply({ type: "GO_BUY" });
      continue;
    }
    if (s.phase === "buy") {
      const trs = cp.hand.filter(c => c.ctype === "treasure");
      if (trs.length > 0) { apply({ type: "PLAY_ALL_TREASURES" }); continue; }
      const lootCards = cp.hand.filter(c => c.ctype === "loot");
      if (lootCards.length > 0) { apply({ type: "PLAY_ACTION", id: lootCards[0].id }); continue; }
      const reachable = Object.keys(HEXES).filter(id => canMoveTo(id, cp.pos, s.mv));
      if (reachable.length > 0) {
        const myCol = HEXES[cp.pos]?.col ?? 0;
        const best = reachable.map(id => {
          const h = HEXES[id];
          if (id === "end") return { id, sc: 99999 };
          const fwd = h.col - myCol; // positive = forward progress
          return { id, sc: difficulty === "easy" ? fwd + Math.random()*2 : fwd * 10 - (h.effect||0)*5 };
        }).sort((a, b) => b.sc - a.sc)[0];
        apply({ type: "MOVE", hexId: best.id });
        continue;
      }
      if (s.buys > 0) {
        const buyScore = (t) => {
          const d = CARDS[t];
          if (!d) return -999;
          if (difficulty === "easy") return Math.random();
          let sc = 0;
          if (d.move) sc += d.move.v * 8;
          sc += (d.draw || 0) * 4;
          sc += (d.actions || 0) * 3;
          sc += (d.buys || 0) * 3;
          sc += (d.coins || 0) * 2;
          if (d.ctype === "duration") sc += 4;
          if (d.ctype === "reaction") sc += 2;
          if (d.loot_trigger) sc += 5;
          sc -= (d.cost || 0) * 0.5;
          return sc;
        };
        const affordable = Object.keys(st.market).filter(t =>
          (s.market[t] || 0) > 0 && CARDS[t] && (CARDS[t].cost || 0) <= s.coins
        ).sort((a, b) => buyScore(b) - buyScore(a));
        if (affordable.length > 0) { apply({ type: "BUY", cardType: affordable[0] }); continue; }
      }
      apply({ type: "END_TURN" });
      break;
    }
    apply({ type: "END_TURN" });
    break;
  }
  if (!actions.length || actions[actions.length - 1]?.type !== "END_TURN") {
    actions.push({ type: "END_TURN" });
  }
  return actions;
}
async function getAIActionsFromAPI(st, difficulty) {
  const info = serializeStateForAI(st);
  const prompt = `Je speelt Vestigium. Spelstatus:
${JSON.stringify(info, null, 2)}
Genereer de VOLLEDIGE beurt als een JSON array van acties. Elke actie heeft een "type" veld.
Beschikbare types: PLAY_ACTION, PLAY_ALL_TREASURES, PLAY_TREASURE, MOVE, GO_BUY, BUY, END_TURN, DISCARD_TOGGLE, DISCARD_CONFIRM, TRASH_TOGGLE, TRASH_CONFIRM.
Voorbeeld response:
[
  {"type":"PLAY_ACTION","id":"p1_machetero_0"},
  {"type":"MOVE","hexId":"a10"},
  {"type":"GO_BUY"},
  {"type":"END_TURN"}
]
Geef ALLEEN de JSON array terug, geen uitleg.`;
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 600,
      system: AI_SYSTEM[difficulty] || AI_SYSTEM.medium,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  const data = await response.json();
  const text = (data.content || []).map(b => b.text || "").join("").trim();
  const clean = text.replace(/```json|```/g, "").trim();
  const arr = JSON.parse(clean);
  if (!Array.isArray(arr)) throw new Error("Geen array");
  return arr;
}

function CampaignMap({ chapterIdx, progress, onSelectLevel, onBack }) {
  const chapter = CAMPAIGN_CHAPTERS[chapterIdx];

      </div>
      {/* Lives + Gold */}
      <div style={{ display:"flex", justifyContent:"center", gap:16, marginBottom:10 }}>
        <div style={{ display:"flex", gap:4, alignItems:"center" }}>
          {[0,1,2].map(i => (
            <span key={i} style={{ fontSize:16, opacity: i < progress.lives ? 1 : 0.2 }}>❤️</span>
          ))}
        </div>
        <div style={{ fontFamily:"Cinzel, serif", fontSize:11, color:"#C9A227", alignSelf:"center" }}>
          💰 {progress.gold} goud
        </div>
      </div>
      {/* SVG Map */}
      <div style={{ overflowX:"auto", borderRadius:10, background:`linear-gradient(135deg, ${chapter.mapBg[0]}, ${chapter.mapBg[1]})`, padding:8 }}>
        <svg width={W} height={H} style={{ display:"block", minWidth:W }}>
          {/* Connection lines */}
          {levels.map(level => (
            level.connects.map(toId => {
              const from = level;
              const to = levels.find(l => l.id === toId);
              if (!to) return null;
              const fx = from.x / 100 * W;
              const fy = from.y / 100 * H;
              const tx = to.x / 100 * W;
              const ty = to.y / 100 * H;
              const bothDone = isLevelCompleted(progress, chapterIdx, from.id)
                            && isLevelUnlocked(progress, chapterIdx, to.id);
              return (
                <line key={`${from.id}-${toId}`}
                  x1={fx} y1={fy} x2={tx} y2={ty}
                  stroke={bothDone ? "#C9A227" : "rgba(255,255,255,0.12)"}
                  strokeWidth={bothDone ? 2 : 1.5}
                  strokeDasharray={bothDone ? "none" : "4,4"}
                />
              );
            })
          ))}
          {/* Level nodes */}
          {levels.map(level => {
            const x = level.x / 100 * W;
            const y = level.y / 100 * H;
            const completed = isLevelCompleted(progress, chapterIdx, level.id);
            const unlocked  = isLevelUnlocked(progress, chapterIdx, level.id);
            const isCurrent = progress.levelIdx === level.id;
            const lt = LEVEL_TYPES[level.type];
            const r = level.isBoss ? 22 : 18;
            return (
              <g key={level.id}
                onClick={() => unlocked && onSelectLevel(level.id)}
                style={{ cursor: unlocked ? "pointer" : "default" }}>
                {/* Glow for unlocked */}
                {unlocked && !completed && (
                  <circle cx={x} cy={y} r={r+6}
                    fill="none" stroke={lt.color} strokeWidth={1} opacity={0.3}/>
                )}
                {/* Current level pulse ring */}
                {isCurrent && (
                  <circle cx={x} cy={y} r={r+10}
                    fill="none" stroke={lt.color} strokeWidth={2} opacity={0.6}/>
                )}
                {/* Main circle */}
                <circle cx={x} cy={y} r={r}
                  fill={completed ? "#2a2000" : unlocked ? "#1a1408" : "#0a0a0a"}
                  stroke={completed ? "#C9A227" : unlocked ? lt.color : "rgba(255,255,255,0.15)"}
                  strokeWidth={level.isBoss ? 3 : 2}
                  opacity={unlocked ? 1 : 0.45}
                />
                {/* Icon */}
                <text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle"
                  fontSize={level.isBoss ? 16 : 13}
                  opacity={unlocked ? 1 : 0.4}
                  style={{ userSelect:"none" }}>
                  {completed ? "✓" : lt.icon}
                </text>
                {/* Name label */}
                <text x={x} y={y + r + 11} textAnchor="middle"
                  fill={completed ? "#C9A227" : unlocked ? "#a09070" : "#3a2a14"}
                  fontSize={8.5} fontFamily="Cinzel, serif"
                  style={{ userSelect:"none" }}>
                  {level.name}
                </text>
              </g>
            );
          })}
        </svg>
      </div>
      {/* Legend */}
      <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginTop:8, justifyContent:"center" }}>
        {Object.entries(LEVEL_TYPES).map(([key, lt]) => (
          <div key={key} style={{ display:"flex", alignItems:"center", gap:4, fontSize:10, color:"#5a4a2a" }}>
            <span>{lt.icon}</span><span>{lt.label}</span>
          </div>
        ))}
      </div>
      {/* Back button */}
      <div style={{ textAlign:"center", marginTop:12 }}>
        <button onClick={onBack}
          style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, color:"#555", fontSize:10, padding:"5px 16px", cursor:"pointer", fontFamily:"Cinzel, serif" }}>
          ← Terug
        </button>
      </div>
    </div>
  );
}

          </button>

                </div>

                background: state.discardPending.length >= Math.min(maxSelect, handToShow.length)

              }}>

                      🛡 {rc.name}
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        );

      {/* ── STORM ATTACK — both players discard ── */}
      {(state.phase === "attack_storm" || state.phase === "attack_storm_victim") && (() => {
        const isAttackerTurn = state.phase === "attack_storm";

        const actingPlayer = state.players[actingIdx];
        const needed = state.discardLeft || 0;
        return (
          <div style={{ ...panel, border:"2px solid rgba(2,136,209,0.5)", background:"rgba(2,136,209,0.07)" }}>

              <div>
                <span style={{ fontFamily:"Cinzel, serif", fontSize:13, color:"#4FC3F7" }}>Storm!</span>

                    : `${actingPlayer.name}: nu jij — leg ${needed} kaart${needed>1?"en":""} af door de Storm.`}
                </div>

            </div>

            <div style={{ display:"flex", gap:7, flexWrap:"wrap", marginBottom:10 }}>

            </div>

              onClick={() => { if(state.discardPending.length >= Math.min(needed, actingPlayer.hand.length)) dispatch({ type:"STORM_DISCARD_CONFIRM" }); }}
              disabled={state.discardPending.length < Math.min(needed, actingPlayer.hand.length)}
              style={{
                background: state.discardPending.length >= Math.min(needed, actingPlayer.hand.length)
                  ? "linear-gradient(135deg,#01579B,#0288D1)" : "rgba(255,255,255,0.06)",
                border:"1px solid #4FC3F744", borderRadius:8, padding:"7px 18px",
                color:"white", fontFamily:"Cinzel, serif", fontSize:11, fontWeight:700,
                cursor: state.discardPending.length >= Math.min(needed, actingPlayer.hand.length) ? "pointer" : "not-allowed",
              }}>
              🌩 Leg {state.discardPending.length} kaart{state.discardPending.length !== 1 ? "en" : ""} af
            </button>
          </div>
        );

      {/* ── TRASH MODE (rood hex effect + Kapel + Pikhouweel + Zoektocht) ── */}
      {state.phase === "trash" && (
        <div style={{ ...panel, border: "2px solid rgba(244,67,54,0.5)", background: "rgba(244,67,54,0.05)" }}>
          <span style={{ ...sectionTitle, color: "#FF7043" }}>
            {state.pendingLootTrigger === "on_trash_valuable"
              ? "⛏ Pikhouweel — Vernietig een kaart"
              : state.pendingLootTrigger === "on_any_trash"
              ? "🔍 Zoektocht — Vernietig kaarten voor Loot"
              : "🗑 Kapel — Selecteer kaarten om permanent te vernietigen"}
          </span>
          {/* Loot trigger hint */}
          {state.pendingLootTrigger === "on_trash_valuable" && (
            <div style={{ fontSize: 11, color: "#FFD700", marginBottom: 8, padding: "6px 10px", background: "rgba(255,215,0,0.08)", border: "1px solid rgba(255,215,0,0.25)", borderRadius: 7 }}>
              💎 Als de kaart die je vernietigt <b>3💰 of meer</b> waard is, krijg je een willekeurige <b>Buitkaart</b>!
            </div>

          {state.pendingLootTrigger === "on_any_trash" && (
            <div style={{ fontSize: 11, color: "#FFD700", marginBottom: 8, padding: "6px 10px", background: "rgba(255,215,0,0.08)", border: "1px solid rgba(255,215,0,0.25)", borderRadius: 7 }}>

          <div style={{ fontSize: 11, color: "#a07060", marginBottom: 10 }}>

          </div>
          <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 12 }}>
            {player.hand.map(card => (
              <CardTile key={card.id} card={card}
                trashSelected={state.trashPending.includes(card.id)}

          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => dispatch({ type: "TRASH_CONFIRM" })} style={{ background: "linear-gradient(135deg,#B71C1C,#F44336)", border: "none", borderRadius: 8, padding: "7px 18px", color: "white", fontFamily: "Cinzel, serif", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
              🗑 Vernietig {state.trashPending.length} kaart{state.trashPending.length !== 1 ? "en" : ""}
            </button>
            <button onClick={() => dispatch({ type: "TRASH_CONFIRM" })} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 8, padding: "7px 14px", color: "#888", fontFamily: "Cinzel, serif", fontSize: 11, cursor: "pointer" }}>
              Overslaan
            </button>

      )}
      {/* ── Hand + Market ── */}
      {!state.winner && state.phase !== "trash" && state.phase !== "discard"
        && state.phase !== "attack_pending" && state.phase !== "attack_storm"

        <div style={{ display: "flex", gap: 10, alignItems: "flex-start", flexWrap: "wrap" }}>
          {/* Hand panel */}
          <div style={{ ...panel, flex: 1, minWidth: 200 }}>

                <span style={sectionTitle}>Actiefase — ⚡{state.actions} actie{state.actions !== 1 ? "s" : ""} resterend</span>

                    const playable = ["action","attack","duration","loot"].includes(card.ctype);

                      <CardTile key={card.id} card={card}
                        onPlay={playable ? () => dispatch({ type: "PLAY_ACTION", id: card.id }) : null}

                {(state.durationCards[state.cur]||[]).length > 0 && (

                    <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                      {(state.durationCards[state.cur]||[]).map((d,i) => {

                            ⏳ {def.name} {d.turnsLeft < 999 ? `(${d.turnsLeft} beurt${d.turnsLeft!==1?"en":""})` : "∞"}
                          </div>

                      })}

                  </div>

                {state.played.length > 0 && (
                  <div style={{ borderTop: "1px solid rgba(139,101,40,0.15)", paddingTop: 7, marginBottom: 8 }}>
                    <span style={{ ...sectionTitle, marginBottom: 4 }}>Gespeeld deze beurt</span>
                    <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                      {state.played.map((c, i) => (
                        <div key={i} style={{ padding: "2px 7px", background: c.bg, borderRadius: 5, fontSize: 9.5, color: "white", border: "1px solid " + c.brd + "50" }}>

                    → Koopfase
                  </button>
                  <button onClick={() => dispatch({ type: "END_TURN" })} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, padding: "7px 14px", color: "#555", fontFamily: "Cinzel, serif", fontSize: 10, cursor: "pointer" }}>
                    Beurt overslaan ↷
                  </button>
                </div>
              </>
            )}
            {/* BUY PHASE */}
            {state.phase === "buy" && (
              <>
                <span style={sectionTitle}>Koopfase — 💰{state.coins} munten · 🛒{state.buys} koop{state.buys !== 1 ? "s" : ""}</span>
                {(treasures.length > 0 || player.hand.some(c => c.ctype === "loot")) && (
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 10, color: "#C9A227", marginBottom: 6 }}>Speel schat- en buitkaarten gratis voor munten:</div>
                    <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 7 }}>
                      {player.hand.map(card => {
                        const playable = card.ctype === "treasure" || card.ctype === "loot";
                        return (
                          <CardTile key={card.id} card={card}
                            onPlay={playable ? () => dispatch({ type: card.ctype === "loot" ? "PLAY_ACTION" : "PLAY_TREASURE", id: card.id }) : null}
                            playLabel={card.ctype === "loot" ? "💎 Spelen" : "💰 Spelen"}
                            canPlay={playable} />
                        );
                      })}
                    </div>
                    {treasures.length > 0 && (
                      <button onClick={() => dispatch({ type: "PLAY_ALL_TREASURES" })} style={{ background: "linear-gradient(135deg,#5A3A00,#8B6914)", border: "1px solid #C9A227", borderRadius: 7, padding: "5px 14px", color: "#C9A227", fontFamily: "Cinzel, serif", fontSize: 10, fontWeight: 700, cursor: "pointer" }}>
                        💰 Speel alle schatten (+{treasures.reduce((s, c) => s + c.coins, 0)}💰)
                      </button>
                    )}
                  </div>
                )}
                {treasures.length === 0 && !player.hand.some(c => c.ctype === "loot") && (
                  <div style={{ fontSize: 11, color: "#3a2a1a", fontStyle: "italic", marginBottom: 8 }}>Geen schat- of buitkaarten in hand</div>
                )}
                {state.played.length > 0 && (
                  <div style={{ borderTop: "1px solid rgba(139,101,40,0.15)", paddingTop: 7, marginBottom: 8 }}>
                    <span style={{ ...sectionTitle, marginBottom: 4 }}>Gespeeld deze beurt</span>
                    <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                      {state.played.map((c, i) => (
                        <div key={i} style={{ padding: "2px 7px", background: c.bg, borderRadius: 5, fontSize: 9.5, color: "white", border: "1px solid " + c.brd + "50" }}>
                          {c.ctype==="loot"?"💎 ":""}{c.name}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                <button onClick={() => dispatch({ type: "END_TURN" })} style={{ background: "linear-gradient(135deg,#3a2800,#8B6914)", border: "1px solid #C9A227", borderRadius: 8, padding: "8px 20px", color: "#C9A227", fontFamily: "Cinzel, serif", fontSize: 12, fontWeight: 700, cursor: "pointer", boxShadow: "0 2px 10px rgba(140,100,20,0.35)", letterSpacing: "0.06em" }}>
                  Expeditie Vervolgen →
                </button>
              </>
            )}
          </div>
          {/* Market panel */}
          <div style={{ ...panel, width: 240, flexShrink: 0 }}>
            <span style={sectionTitle}>Markt — deze expeditie</span>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
              {state.marketTypes.map(type => (
                <MarketTile key={type} cardType={type}
                  supply={state.market[type]}
                  coins={state.coins}
                  buys={state.buys}
                  dispatch={dispatch}
                  buyable={state.phase === "buy"} />
              ))}
            </div>
            {/* Loot stack indicator */}
            {state.lootStack && state.lootStack.length > 0 && (
              <div style={{ marginTop:8, padding:"6px 8px", background:"rgba(201,162,39,0.07)", border:"1px solid rgba(201,162,39,0.2)", borderRadius:7 }}>
                <div style={{ fontFamily:"Cinzel, serif", fontSize:9.5, color:"#C9A227", marginBottom:3 }}>💎 Buitstapel</div>
                <div style={{ fontSize:9, color:"#7a6a3a" }}>{state.lootStack.length} buitkaarten resterend</div>
                <div style={{ fontSize:8.5, color:"#5a4a2a", fontStyle:"italic", marginTop:2 }}>
                  Verdien via: Juwelenkist, Pikhouweel, Zoektocht, Keelsnijder, Plunderaar, Kraaiennest
                </div>
              </div>
            )}
            <div style={{ marginTop: 8, fontSize: 9.5, color: "#3a2a1a", fontStyle: "italic", lineHeight: 1.5 }}>
              Kopen kan alleen in de koopfase.<br />
              Elke expeditie heeft een andere markt.
            </div>
          </div>
        </div>
      )}
      {/* ── Log ── */}
      <div style={{ ...panel, marginBottom: 0 }}>
        <div onClick={() => setShowLog(s => !s)} style={{ cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={sectionTitle}>📜 Spellog</span>
          <span style={{ fontSize: 11, color: "#3a2a1a" }}>{showLog ? "▲" : "▼"}</span>
        </div>
        {showLog && (
          <div style={{ maxHeight: 120, overflowY: "auto", borderTop: "1px solid rgba(139,101,40,0.15)", paddingTop: 7, fontSize: 10.5, color: "#5a4a2a", lineHeight: 1.7 }}>
            {[...state.log].reverse().map((l, i) => <div key={i}>{l}</div>)}
          </div>
        )}
      </div>
    </div>
  );
}
  </script>
  <script type="text/babel" data-presets="react">
function App() {
  const [gameMode, setGameMode] = useState(null);
  const [difficulty, setDifficulty] = useState("medium");
  const [numTiles, setNumTiles] = useState(5);
  const [tileSize, setTileSize] = useState(2);
  const [marketTab, setMarketTab] = useState("presets");
  const [setupStep, setSetupStep] = useState("mode");
  const [pendingMode, setPendingMode] = useState(null);
  const [customMarket, setCustomMarket] = useState(null);
  const [campaignDifficulty, setCampaignDifficulty] = useState("medium");
  const [campaignProgress, setCampaignProgress] = useState(() => makeFreshProgress());
  const [campStoryIdx, setCampStoryIdx] = useState(0);
  const updateProgress = (fn) => setCampaignProgress(prev => {
    const next = fn({...prev});
    return next;
  });
  useEffect(() => {
    if (gameMode !== "campaign") return;
    if (state.winner === null) return;
    const cp = campaignProgress;
    if (cp.screen !== "game") return;
    if (state.winner === 0) {
      const ch = CAMPAIGN_CHAPTERS[cp.chapter];
      const level = ch.levels.find(l => l.id === cp.levelIdx);
      const newProgress = unlockConnectedLevels(cp, cp.chapter, level);
      newProgress.completedLevels = { ...cp.completedLevels, [levelKey(cp.chapter, cp.levelIdx)]: true };
      newProgress.persistentDeck = state.players[0].deck
        .concat(state.players[0].discard)
        .concat(state.players[0].hand)
        .map(c => c.cardType).filter(Boolean);
      if (level.type === "fight" || level.type === "elite") newProgress.gold = cp.gold + 1;
      if (level.type === "boss") newProgress.gold = cp.gold + 3;
      if (level.type === "rest") {
        newProgress.screen = "rest";
      } else if (level.type === "shop") {
        const pool = [...MARKET_POOL];
        for (let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
        newProgress.shopCards = pool.slice(0, 4);
        newProgress.screen = "shop";
      } else if (level.isBoss) {
        if (cp.chapter >= CAMPAIGN_CHAPTERS.length - 1) {
          newProgress.screen = "campaignWon";
        } else {
          newProgress.screen = "chapterWin";
        }
      } else {
        newProgress.screen = "levelWin";
      }
      setCampStoryIdx(0);
      setCampaignProgress(newProgress);
      setGameMode(null);
    } else {
      const newLives = cp.lives - 1;
      if (newLives <= 0) {
        updateProgress(p => ({ ...p, lives: 3, screen: "map",
          completedLevels: Object.fromEntries(
            Object.entries(p.completedLevels).filter(([k]) => k.startsWith(p.chapter + "_"))
          ),
        }));
      } else {
        updateProgress(p => ({ ...p, lives: newLives, screen: "map" }));
      }
      setGameMode(null);
    }
  }, [state.winner]);
  // ── CAMPAIGN SCREENS ──
  if (setupStep === "campaign") {
    const bg = { minHeight:"100vh", background:"radial-gradient(ellipse at 20% 10%, #12100a 0%, #0c0b08 40%, #080a0c 100%)", color:"#dfd0a8", fontFamily:"IM Fell English, Georgia, serif", padding:"20px 16px" };
    const gp = campaignProgress;
    const goldTitle = { fontFamily:"Cinzel, serif", letterSpacing:"0.12em", background:"linear-gradient(135deg,#e8c84a,#C9A227)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" };
    const centeredBox = { display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", minHeight:"100vh" };
    // ── Chapter select ──
    if (gp.screen === "chapterSelect") {
      return (
        <div style={bg}>
          <div style={{ textAlign:"center", marginBottom:20 }}>
            <div style={{ fontSize:9, color:"#5a4a28", letterSpacing:"0.3em", textTransform:"uppercase", marginBottom:6 }}>✦ VESTIGIUM ✦</div>
            <h2 style={{ ...goldTitle, fontSize:20, display:"block" }}>De Tocht naar de Gouden Stad</h2>
            <div style={{ fontSize:11, color:"#5a4a2a", fontStyle:"italic", marginTop:4 }}>Kies een hoofdstuk</div>
          </div>
          <div style={{ maxWidth:560, margin:"0 auto", display:"flex", flexDirection:"column", gap:8 }}>
            {CAMPAIGN_CHAPTERS.map((ch, idx) => {
              const allLevels = ch.levels.length;
              const done = ch.levels.filter(l => isLevelCompleted(gp, idx, l.id)).length;
              const chUnlocked = idx === 0 || done > 0 || ch.levels.some(l => isLevelUnlocked(gp, idx, l.id));
              const chCompleted = isLevelCompleted(gp, idx, ch.levels[ch.levels.length-1].id);
              return (
                <div key={idx}
                  onClick={() => {
                    if (!chUnlocked) return;
                    const newProg = { ...gp, chapter: idx };
                    if (!newProg.unlockedLevels[levelKey(idx, 0)]) {
                      newProg.unlockedLevels = { ...newProg.unlockedLevels, [levelKey(idx, 0)]: true };
                    }
                    newProg.screen = "map";
                    setCampaignProgress(newProg);
                  }}
                  style={{
                    background: chUnlocked ? "rgba(255,255,255,0.025)" : "rgba(255,255,255,0.01)",
                    border: `1px solid ${chCompleted ? "rgba(201,162,39,0.4)" : chUnlocked ? "rgba(201,162,39,0.15)" : "rgba(255,255,255,0.05)"}`,
                    borderRadius:12, padding:"12px 16px", cursor: chUnlocked ? "pointer" : "not-allowed",
                    display:"flex", alignItems:"center", gap:14, opacity: chUnlocked ? 1 : 0.4,
                  }}>
                  <div style={{ fontSize:28, flexShrink:0 }}>{ch.image}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontFamily:"Cinzel, serif", fontSize:11, color:"#5a4a2a", marginBottom:2 }}>Hoofdstuk {ch.id}</div>
                    <div style={{ fontFamily:"Cinzel, serif", fontSize:14, color: chCompleted ? "#C9A227" : "#dfd0a8" }}>{ch.title}</div>
                    <div style={{ fontSize:10, color:"#4a3a2a", fontStyle:"italic" }}>{ch.subtitle}</div>
                  </div>
                  <div style={{ textAlign:"right", flexShrink:0 }}>
                    <div style={{ fontSize:10, color: chCompleted ? "#C9A227" : "#4a3a2a", fontFamily:"Cinzel, serif" }}>
                      {done}/{allLevels}
                    </div>
                    <div style={{ fontSize:10, color: chCompleted ? "#4CAF50" : "#3a2a14" }}>
                      {chCompleted ? "✓ Voltooid" : chUnlocked ? "▶ Spelen" : "🔒"}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ textAlign:"center", marginTop:16 }}>
            <button onClick={() => { setSetupStep("mode"); }}
              style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, color:"#555", fontSize:10, padding:"6px 16px", cursor:"pointer", fontFamily:"Cinzel, serif" }}>
              ← Terug naar hoofdmenu
            </button>
          </div>
        </div>
      );
    }
    // ── Map ──
    if (gp.screen === "map") {
      return (
        <div style={bg}>
          <CampaignMap
            chapterIdx={gp.chapter}
            progress={gp}
            onSelectLevel={(levelId) => {
              const ch = CAMPAIGN_CHAPTERS[gp.chapter];
              const level = ch.levels.find(l => l.id === levelId);
              updateProgress(p => ({ ...p, levelIdx: levelId, screen: "levelIntro" }));
              setCampStoryIdx(0);
            }}
            onBack={() => updateProgress(p => ({ ...p, screen: "chapterSelect" }))}
          />
        </div>
      );
    }
    // ── Level intro ──
    if (gp.screen === "levelIntro") {
      const ch = CAMPAIGN_CHAPTERS[gp.chapter];
      const level = ch.levels.find(l => l.id === gp.levelIdx);
      const lt = LEVEL_TYPES[level.type];
      const story = level.story || [];
      const isLast = campStoryIdx >= story.length - 1;
      const startLevel = () => {
        if (level.type === "story") {
          const newProg = unlockConnectedLevels(gp, gp.chapter, level);
          newProg.completedLevels = { ...gp.completedLevels, [levelKey(gp.chapter, level.id)]: true };
          newProg.screen = "map";

        {
          id:"b3", tier:"beginner", name:"De Handelaar",
          desc:"Marktgerichte kaarten plus goede beweging. Makkelijk munten verdienen.",
          cards:["peddler","merchant","workshop","trader","cellar","porter","cartographer","smithy"],
        },
        {
          id:"m1", tier:"medium", name:"Dorpsraad",
          desc:"Dorp + Expeditie-combo. Bouw een actieketting op en beweeg ver.",
          cards:["chapel","village_card","smithy","festival","laboratory","scout","rower","marketplace"],
        },
        {
          id:"m2", tier:"medium", name:"De Ontdekkingsreiziger",
          desc:"Universele beweging + markt-economie. Meerdere wegen naar het einde.",
          cards:["adventurer","guide","trailblazer","merchant","festival","workshop","pathfinder","navigator"],
        },
        {
          id:"m3", tier:"medium", name:"Rijke Handelswegen",
          desc:"Economisch sterk: veel munten en kopen. Koop je weg naar de overwinning.",
          cards:["treasurer","marketplace","festival","cellar","militia","council","peddler","village_card"],
        },
        {
          id:"h1", tier:"hard", name:"Kapelstrategie",
          desc:"Vernietigen is de sleutel. Bouw een ultra-lean deck van 4-5 kaarten en race door.",
          cards:["chapel","remodel","village_card","laboratory","pathfinder","navigator","conquistador","bazaar"],
        },
        {
          id:"h2", tier:"hard", name:"Keizerscombo",
          desc:"Dure maar krachtige kaarten. Festival + Bazaar + Keizer = explosieve beurten.",
          cards:["festival","bazaar","chancellor","emperor","laboratory","council","expedition","trailblazer"],
        },
        {
          id:"h3", tier:"hard", name:"De Legende",
          desc:"Maximale bewegingspotentie. Kies je terrein, bouw diep en race in twee beurten.",
          cards:["chapel","explorer","admiral","legend","conquistador","pathfinder","navigator","guide"],
        },
      ];
      const TIER_CONFIG = {
        beginner: { label:"Beginner",  color:"#4CAF50", bg:"rgba(76,175,80,0.1)",  border:"rgba(76,175,80,0.3)"  },
        medium:   { label:"Gemiddeld", color:"#FF9800", bg:"rgba(255,152,0,0.1)",  border:"rgba(255,152,0,0.3)"  },
        hard:     { label:"Moeilijk",  color:"#F44336", bg:"rgba(244,67,54,0.1)",  border:"rgba(244,67,54,0.3)"  },
      };
      const tiers = [
        { label: "Kosten 2", cards: MARKET_POOL.filter(t => CARDS[t].cost === 2) },
        { label: "Kosten 3", cards: MARKET_POOL.filter(t => CARDS[t].cost === 3) },
        { label: "Kosten 4", cards: MARKET_POOL.filter(t => CARDS[t].cost === 4) },
        { label: "Kosten 5", cards: MARKET_POOL.filter(t => CARDS[t].cost === 5) },
        { label: "Kosten 6", cards: MARKET_POOL.filter(t => CARDS[t].cost === 6) },
        { label: "Kosten 7+", cards: MARKET_POOL.filter(t => CARDS[t].cost >= 7) },
      ];
      return (
        <div style={{ minHeight:"100vh", background:"radial-gradient(ellipse at 20% 10%, #12100a 0%, #0c0b08 40%, #080a0c 100%)", color:"#dfd0a8", fontFamily:"IM Fell English, Georgia, serif", padding:"16px 12px" }}>
          {titleBlock}
          {/* Header */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", maxWidth:780, margin:"0 auto 14px", flexWrap:"wrap", gap:8 }}>
            <div>
              <div style={{ fontFamily:"Cinzel, serif", fontSize:14, color:"#C9A227" }}>🃏 Kies je markt</div>
              <div style={{ fontSize:11, color:"#5a4a2a", marginTop:2, fontStyle:"italic" }}>
                Zilver &amp; Goud zijn altijd aanwezig · Geselecteerd: <b style={{ color:"#C9A227" }}>{selected.length}</b> kaarten
              </div>
            </div>
            <button onClick={() => setSetupStep("mode")} style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:8, color:"#666", fontSize:10, padding:"5px 12px", cursor:"pointer", fontFamily:"Cinzel, serif" }}>
              ← Terug
            </button>
          </div>
          {/* Tabs */}
          <div style={{ maxWidth:780, margin:"0 auto 16px", display:"flex", border:"1px solid rgba(201,162,39,0.2)", borderRadius:10, overflow:"hidden" }}>
            {[{id:"presets",label:"📦 Voorgemaakte Sets"},{id:"custom",label:"✏️ Eigen Keuze"}].map(tab => (
              <div key={tab.id} onClick={() => setMarketTab(tab.id)} style={{
                flex:1, textAlign:"center", padding:"10px 8px", cursor:"pointer",
                background:marketTab===tab.id?"rgba(201,162,39,0.12)":"rgba(255,255,255,0.02)",
                borderRight:tab.id==="presets"?"1px solid rgba(201,162,39,0.2)":"none",
                borderBottom:marketTab===tab.id?"2px solid #C9A227":"2px solid transparent",
                fontFamily:"Cinzel, serif", fontSize:11, fontWeight:700,
                color:marketTab===tab.id?"#C9A227":"#5a4a2a", transition:"all 0.15s",
              }}>{tab.label}</div>
            ))}
          </div>
          {/* ── PRESETS TAB ── */}
          {marketTab === "presets" && (
            <div style={{ maxWidth:780, margin:"0 auto" }}>
              {["beginner","medium","hard"].map(tier => {
                const tc = TIER_CONFIG[tier];
                return (
                  <div key={tier} style={{ marginBottom:22 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
                      <div style={{ height:1, flex:1, background:tc.border }}/>
                      <div style={{ fontFamily:"Cinzel, serif", fontSize:11, color:tc.color, letterSpacing:"0.14em", textTransform:"uppercase", fontWeight:700 }}>{tc.label}</div>
                      <div style={{ height:1, flex:1, background:tc.border }}/>
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:10 }}>
                      {PRESETS.filter(p => p.tier===tier).map(preset => {
                        const isActive = selected.length===preset.cards.length && preset.cards.every(c=>selected.includes(c));
                        return (
                          <div key={preset.id} onClick={() => setCustomMarket(preset.cards)} style={{
                            background:isActive?tc.bg:"rgba(255,255,255,0.025)",
                            border:"2px solid "+(isActive?tc.color:"rgba(255,255,255,0.08)"),
                            borderRadius:12, padding:"12px 14px", cursor:"pointer",
                            transition:"all 0.15s",
                            boxShadow:isActive?"0 0 14px "+tc.color+"44":"none",
                          }}>
                            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:4 }}>
                              <div style={{ fontFamily:"Cinzel, serif", fontSize:13, color:isActive?tc.color:"#C9A227", fontWeight:700 }}>{preset.name}</div>
                              {isActive && <div style={{ background:tc.color, color:"white", borderRadius:"50%", width:18, height:18, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, flexShrink:0 }}>✓</div>}
                            </div>
                            <div style={{ fontSize:11, color:"#7a6a3a", fontStyle:"italic", marginBottom:8, lineHeight:1.4 }}>{preset.desc}</div>
                            <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                              {preset.cards.map(ct => {
                                const d = CARDS[ct];
                                return <div key={ct} style={{ background:d.bg, border:"1px solid "+d.brd+"60", borderRadius:5, padding:"2px 6px", fontSize:9, color:"white" }}>{d.name}</div>;
                              })}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {/* ── CUSTOM TAB ── */}
          {marketTab === "custom" && (
            <div style={{ maxWidth:780, margin:"0 auto" }}>
              <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
                <button onClick={() => initCustomMarket()} style={{ background:"rgba(180,140,50,0.15)", border:"1px solid rgba(180,140,50,0.3)", borderRadius:8, color:"#C9A227", fontSize:10, padding:"5px 12px", cursor:"pointer", fontFamily:"Cinzel, serif" }}>🎲 Willekeurig</button>
                <button onClick={() => setCustomMarket([])} style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:8, color:"#888", fontSize:10, padding:"5px 12px", cursor:"pointer", fontFamily:"Cinzel, serif" }}>✕ Leegmaken</button>
              </div>
              <div style={{ marginBottom:12 }}>
                <div style={{ fontSize:9.5, color:"#5a4a2a", letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:6, fontFamily:"Cinzel, serif" }}>Altijd aanwezig</div>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                  {MARKET_ALWAYS.map(t => { const d=CARDS[t]; return (
                    <div key={t} style={{ background:d.bg, border:"2px solid "+d.brd, borderRadius:8, padding:"5px 10px", opacity:0.7 }}>
                      <div style={{ fontFamily:"Cinzel, serif", fontSize:10, color:"white" }}>{d.name}</div>
                      <div style={{ fontSize:9, color:"rgba(255,255,255,0.6)" }}>💰 {d.cost}</div>
                    </div>
                  ); })}
                </div>
              </div>
              {tiers.map(tier => tier.cards.length===0?null:(
                <div key={tier.label} style={{ marginBottom:14 }}>
                  <div style={{ fontSize:9.5, color:"#5a4a2a", letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:6, fontFamily:"Cinzel, serif" }}>{tier.label}</div>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                    {tier.cards.map(t => {
                      const d=CARDS[t]; const sel=selected.includes(t);
                      const mt=d.move?TERRAIN[d.move.t]:null;
                      return (
                        <div key={t} onClick={() => toggle(t)} style={{
                          width:90, background:d.bg, borderRadius:9, cursor:"pointer",
                          border:"2px solid "+(sel?d.brd:"rgba(255,255,255,0.1)"),
                          boxShadow:sel?"0 0 10px "+d.brd+"88":"none",
                          transform:sel?"translateY(-2px)":"none",
                          transition:"all 0.12s", overflow:"hidden", position:"relative",
                        }}>
                          {sel&&<div style={{ position:"absolute", top:3, right:3, background:d.brd, borderRadius:"50%", width:14, height:14, display:"flex", alignItems:"center", justifyContent:"center", fontSize:9 }}>✓</div>}
                          <div style={{ padding:"5px 6px 3px", background:"rgba(0,0,0,0.3)" }}>
                            <div style={{ fontFamily:"Cinzel, serif", fontSize:10, fontWeight:700, color:"white", lineHeight:1.2 }}>{d.name}</div>
                            <div style={{ fontSize:8, color:"rgba(255,255,255,0.6)", marginTop:1 }}>{mt?mt.icon+" "+mt.label:d.ctype==="treasure"?"💰 Schat":"⚡ Actie"}</div>
                          </div>
                          <div style={{ padding:"4px 6px 5px", fontSize:9.5, color:"rgba(255,255,255,0.85)", lineHeight:1.5 }}>
                            {d.move&&<div>🏃 +{d.move.v}</div>}
                            {d.coins>0&&<div>💰 +{d.coins}</div>}
                            {d.actions>0&&<div>⚡ +{d.actions}</div>}
                            {d.buys>0&&<div>🛒 +{d.buys}</div>}
                            {d.draw>0&&<div>🃏 +{d.draw}</div>}
                            {d.trash>0&&<div>🗑 {d.trash}</div>}
                            <div style={{ marginTop:2, opacity:0.6 }}>💰 kost {d.cost}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          )}
          {/* Start button */}
          <div style={{ maxWidth:780, margin:"16px auto 0", textAlign:"center", paddingBottom:30 }}>
            {!canStart&&<div style={{ fontSize:11, color:"#5a4a2a", fontStyle:"italic", marginBottom:8 }}>Selecteer een set of minimaal 1 kaart om te starten</div>}
            <button onClick={() => { if(canStart){ setGameMode(pendingMode); setSetupStep("mode"); } }} disabled={!canStart}
              style={btn({
                background:canStart?"linear-gradient(135deg,#3a2800,#8B6914)":"rgba(255,255,255,0.05)",
                color:canStart?"#C9A227":"#444",
                border:"1px solid "+(canStart?"#C9A227":"rgba(255,255,255,0.1)"),
                boxShadow:canStart?"0 2px 16px rgba(140,100,20,0.5)":"none",
                padding:"12px 40px", fontSize:14, cursor:canStart?"pointer":"not-allowed",
              })}>
              ⚔ Start Expeditie ({selected.length + MARKET_ALWAYS.length} kaarten in markt)
            </button>
          </div>
        </div>
      );
    }
  }
  return <GameScreen
    state={state} dispatch={dispatch} player={player} isAITurn={isAITurn}
    hasMv={hasMv} treasures={treasures} phaseColors={phaseColors}
    phaseLabels={phaseLabels} panel={panel} sectionTitle={sectionTitle} btn={btn}
    showHelp={showHelp} setShowHelp={setShowHelp}
    showLog={showLog} setShowLog={setShowLog}
    aiThinking={aiThinking} aiError={aiError}
    gameMode={gameMode} campaignProgress={campaignProgress}
    updateProgress={updateProgress} setSetupStep={setSetupStep}
    setGameMode={setGameMode} activeDifficulty={activeDifficulty}
    difficulty={difficulty} setCampStoryIdx={setCampStoryIdx}
  />;
}
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
  </script>
</body>
</html>
